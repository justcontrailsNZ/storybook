<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: #f4fce8; 
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .story-container {
            background: white;
            max-width: 800px;
            width: 90%;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
        h1 {
            color: #ff6b6b; 
            text-align: center;
            font-size: 40px;
        }
        /* The automatic picture frame */
        .story-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 15px;
            margin: 0 auto 30px auto;
            display: block;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .story-content {
            font-size: 20px; 
            line-height: 1.8;
            transition: font-size 0.3s ease; 
        }
        .controls {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px dashed #eee;
        }
        button {
            background-color: #4ecdc4; 
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            margin: 0 10px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover {
            background-color: #45b7aa;
        }
        .back-link {
            display: block;
            margin-top: 40px;
            text-align: center;
            text-decoration: none;
            color: #ff6b6b;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="story-container">
        <h1>{{ page.title }}</h1>
        
        <!-- THIS IS THE MAGIC AI PICTURE LINK -->
        <img src="https://image.pollinations.ai/prompt/cute%20childrens%20storybook%20illustration%20of%20{{ page.title | url_encode }}?width=800&height=400&nologo=true&seed=42" alt="Automatic Story Illustration" class="story-image">

        <div class="controls">
            <button onclick="changeTextSize(4)">Make Text Bigger ➕</button>
            <button onclick="changeTextSize(-4)">Make Text Smaller ➖</button>
        </div>

        <div class="story-content" id="story-text">
            {{ content }}
        </div>

        <a href="{{ site.baseurl }}/" class="back-link">⬅ Back to Home</a>
    </div>

    <script>
        const storyText = document.getElementById('story-text');
        let currentSize = 20; 

        function changeTextSize(change) {
            currentSize += change;
            if (currentSize > 60) currentSize = 60;
            if (currentSize < 14) currentSize = 14;
            storyText.style.fontSize = currentSize + 'px';
        }
    </script>

</body>
</html>
